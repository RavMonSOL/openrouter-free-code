<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenRouter Free Code</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
      color: #333;
    }
    h1 { margin-bottom: 30px; }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      margin-bottom: 10px;
    }
    select, input {
      padding: 8px;
      margin-right: 10px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #0052a3; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    pre {
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      border-radius: 4px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.4;
    }
    .error {
      color: #d32f2f;
      background: #ffebee;
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .success {
      color: #2e7d32;
      background: #e8f5e9;
      padding: 10px;
      border-radius: 4px;
      margin: 10px 0;
    }
    .meta {
      font-size: 12px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>OpenRouter Free Code</h1>
  
  <div>
    <label>Model:</label>
    <select id="model">
      <option value="stepfun/step-3.5-flash">Step-3.5 Flash (default)</option>
      <option value="stepfun/step-3.5-max">Step-3.5 Max</option>
      <option value="stepfun/step-4-flash">Step-4 Flash</option>
      <option value="stepfun/step-4-max">Step-4 Max</option>
    </select>
    
    <label>Language:</label>
    <select id="language">
      <option value="javascript">JavaScript</option>
      <option value="typescript">TypeScript</option>
      <option value="python">Python</option>
      <option value="rust">Rust</option>
      <option value="go">Go</option>
      <option value="java">Java</option>
      <option value="csharp">C#</option>
      <option value="bash">Bash</option>
      <option value="sql">SQL</option>
    </select>
  </div>
  
  <div style="margin-top: 20px;">
    <textarea id="prompt" placeholder="Describe the code you want to generate...

Example: 'Create a Node.js function that reads a file and returns its contents as JSON'"></textarea>
  </div>
  
  <button id="generate" onclick="generate()">Generate Code</button>
  <button onclick="clearAll()">Clear</button>
  
  <div id="status" class="success" style="display:none;"></div>
  <div id="error" class="error" style="display:none;"></div>
  
  <div id="output" style="display:none;">
    <pre id="code"></pre>
    <div id="meta" class="meta"></div>
  </div>

  <script>
    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) {
        alert('Please enter a prompt');
        return;
      }
      
      const model = document.getElementById('model').value;
      const language = document.getElementById('language').value;
      
      const btn = document.getElementById('generate');
      const status = document.getElementById('status');
      const error = document.getElementById('error');
      const output = document.getElementById('output');
      const code = document.getElementById('code');
      const meta = document.getElementById('meta');
      
      btn.disabled = true;
      status.style.display = 'none';
      error.style.display = 'none';
      output.style.display = 'none';
      
      try {
        const response = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt, model, language })
        });
        
        const data = await response.json();
        
        if (!response.ok || !data.success) {
          throw new Error(data.error || 'Unknown error');
        }
        
        code.textContent = data.code;
        meta.textContent = `Model: ${data.model} | Tokens: ${data.usage?.total_tokens || 'N/A'} | ${new Date().toLocaleTimeString()}`;
        output.style.display = 'block';
        status.textContent = 'Code generated successfully!';
        status.style.display = 'block';
      } catch (err) {
        error.textContent = err.message;
        error.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }
    
    function clearAll() {
      document.getElementById('prompt').value = '';
      document.getElementById('output').style.display = 'none';
      document.getElementById('status').style.display = 'none';
      document.getElementById('error').style.display = 'none';
    }
  </script>
</body>
</html>
